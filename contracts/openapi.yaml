openapi: 3.0.3
info:
  title: OWL Market API
  version: 0.1.0
  description: Contract for the Next.js route handlers consumed by the OWL Market web app.
servers:
  - url: /
tags:
  - name: Public
    description: Market and catalog endpoints consumed by public pages.
  - name: Admin
    description: Inventory and order endpoints consumed by admin workflows.
paths:
  /api/markets:
    get:
      tags:
        - Public
      operationId: listMarketCards
      summary: List market cards ranked by the selected price metric.
      parameters:
        - name: set
          in: query
          description: Set UUID to filter by, or all for every set.
          schema:
            type: string
            default: all
        - name: sort
          in: query
          schema:
            $ref: "#/components/schemas/MarketSortKey"
            default: value
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Ranked market cards.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CardRow"
        "500":
          $ref: "#/components/responses/Error"
  /api/characters:
    get:
      tags:
        - Public
      operationId: listCharacterIndexes
      summary: List character indexes with top priced cards.
      responses:
        "200":
          description: Character index rows.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CharacterIndexItem"
        "500":
          $ref: "#/components/responses/Error"
  /api/rarities:
    get:
      tags:
        - Public
      operationId: listRarityIndexes
      summary: List rarity indexes with top priced cards.
      responses:
        "200":
          description: Rarity index rows.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RarityIndexItem"
        "500":
          $ref: "#/components/responses/Error"
  /api/sets:
    get:
      tags:
        - Public
      operationId: listSetIndexes
      summary: List set indexes and lower-priority extra sets.
      responses:
        "200":
          description: Aggregated set indexes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetIndexResponse"
        "500":
          $ref: "#/components/responses/Error"
  /api/sets/{slug}:
    get:
      tags:
        - Public
      operationId: getSetDetail
      summary: Get one set and all cards in it.
      parameters:
        - name: slug
          in: path
          required: true
          description: Set slug or code.
          schema:
            type: string
      responses:
        "200":
          description: Set detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetDetailResponse"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /api/card/{id}:
    get:
      tags:
        - Public
      operationId: getCardDetail
      summary: Get one card by card image ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Card image identifier.
          schema:
            type: string
      responses:
        "200":
          description: Card detail with price history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardDetailResponse"
        "404":
          $ref: "#/components/responses/Error"
  /api/admin/cards/search:
    get:
      tags:
        - Admin
      operationId: searchAdminCards
      summary: Search catalog cards for inventory matching.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
      responses:
        "200":
          description: Matching cards, or an empty array when the query is too short.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CardSearchResult"
        "500":
          $ref: "#/components/responses/Error"
  /api/admin/inventory:
    post:
      tags:
        - Admin
      operationId: createInventoryItem
      summary: Create inventory items or clone an existing inventory item.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/InventoryCreateRequest"
                - $ref: "#/components/schemas/InventoryCloneRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/InventoryCreateMultipartRequest"
      responses:
        "200":
          description: Created count for new rows, or the cloned inventory row.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/InventoryCreateResponse"
                  - $ref: "#/components/schemas/InventoryItemMutationResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
    delete:
      tags:
        - Admin
      operationId: deleteInventoryItems
      summary: Delete a batch of inventory items.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryBulkDeleteRequest"
      responses:
        "200":
          description: Delete result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryBulkDeleteResponse"
        "400":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /api/admin/inventory/{id}:
    patch:
      tags:
        - Admin
      operationId: updateInventoryItem
      summary: Update one inventory item.
      parameters:
        - $ref: "#/components/parameters/InventoryItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryPatchRequest"
      responses:
        "200":
          description: Updated inventory item fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryPatchResponse"
        "400":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
    delete:
      tags:
        - Admin
      operationId: deleteInventoryItem
      summary: Delete one inventory item.
      parameters:
        - $ref: "#/components/parameters/InventoryItemId"
      responses:
        "200":
          description: Deleted inventory item ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
        "500":
          $ref: "#/components/responses/Error"
  /api/admin/inventory/import/psa:
    post:
      tags:
        - Admin
      operationId: importPsaInventory
      summary: Import PSA CSV rows as graded inventory items.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PsaImportRequest"
      responses:
        "200":
          description: PSA import summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PsaImportResponse"
        "400":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /api/admin/orders:
    post:
      tags:
        - Admin
      operationId: createCustomerOrder
      summary: Create a customer order from inventory items.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerOrderWriteRequest"
      responses:
        "200":
          description: Created order ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
        "400":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /api/admin/orders/{id}:
    patch:
      tags:
        - Admin
      operationId: updateCustomerOrder
      summary: Update a customer order and its inventory items.
      parameters:
        - $ref: "#/components/parameters/CustomerOrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerOrderWriteRequest"
      responses:
        "200":
          description: Updated order ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
        "400":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
    delete:
      tags:
        - Admin
      operationId: deleteCustomerOrder
      summary: Delete a customer order and release its inventory items.
      parameters:
        - $ref: "#/components/parameters/CustomerOrderId"
      responses:
        "200":
          description: Deleted order ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
        "500":
          $ref: "#/components/responses/Error"
components:
  parameters:
    InventoryItemId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CustomerOrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
    IdResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: string
    MarketSortKey:
      type: string
      enum:
        - value
        - chg_1d
        - chg_7d
        - chg_30d
    InventoryType:
      type: string
      enum:
        - raw
        - damaged
        - graded
        - sealed
    InventoryStatus:
      type: string
      enum:
        - new
        - grading
        - sale
        - ship
        - sold
    CatalogMatchStatus:
      type: string
      enum:
        - matched
        - needs_match
        - custom_verified
    GradedRating:
      type: string
      enum:
        - TAG 10
        - PSA 10
        - PSA 9
        - PSA 8.5
        - PSA 8
        - PSA 7.5
        - PSA 7
        - PSA 6.5
        - PSA 6
        - PSA 5.5
        - PSA 5
        - PSA 4.5
        - PSA 4
        - PSA 3.5
        - PSA 3
        - PSA 2.5
        - PSA 2
        - PSA 1.5
        - PSA 1
        - PSA Authentic
        - BGS 10
        - BGS 9.5
    SaleChannel:
      type: string
      enum:
        - not_sold
        - ebay
        - fb
        - instagram
        - in_person
        - traded
    PurchasedFrom:
      type: string
      enum:
        - facebook
        - ebay
        - instagram
        - direct_person
        - event
    SetInfo:
      type: object
      required:
        - id
        - slug
        - code
        - name
        - series
        - color
        - year
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        code:
          type: string
        name:
          type: string
        series:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        year:
          type: integer
          nullable: true
    PriceStats:
      type: object
      required:
        - market_avg
        - tcg_market
        - ebay_avg
        - chg_1d
        - chg_7d
        - chg_30d
      properties:
        market_avg:
          type: number
          nullable: true
        tcg_market:
          type: number
          nullable: true
        ebay_avg:
          type: number
          nullable: true
        chg_1d:
          type: number
          nullable: true
        chg_7d:
          type: number
          nullable: true
        chg_30d:
          type: number
          nullable: true
    CardBase:
      type: object
      required:
        - id
        - card_image_id
        - card_number
        - name
        - name_base
        - variant_label
        - rarity
        - card_type
        - color
        - image_url
        - image_url_small
      properties:
        id:
          type: string
          format: uuid
        card_image_id:
          type: string
        card_number:
          type: string
          nullable: true
        name:
          type: string
        name_base:
          type: string
          nullable: true
        variant_label:
          type: string
          nullable: true
        rarity:
          type: string
          nullable: true
        card_type:
          type: string
          nullable: true
        color:
          type: array
          items:
            type: string
        image_url:
          type: string
          nullable: true
        image_url_small:
          type: string
          nullable: true
    CardRow:
      allOf:
        - $ref: "#/components/schemas/CardBase"
        - type: object
          required:
            - price_stats
            - sets
          properties:
            price_stats:
              allOf:
                - $ref: "#/components/schemas/PriceStats"
              nullable: true
            sets:
              allOf:
                - $ref: "#/components/schemas/SetInfo"
              nullable: true
    CardWithPriceStats:
      allOf:
        - $ref: "#/components/schemas/CardBase"
        - type: object
          required:
            - price_stats
          properties:
            price_stats:
              allOf:
                - $ref: "#/components/schemas/PriceStats"
              nullable: true
    CharacterTopCard:
      type: object
      required:
        - name
        - set
        - rarity
        - tcg
        - avg
        - chg1d
        - chg7d
        - chg30d
        - spark
        - imageUrl
        - imageUrlSmall
        - cardImageId
      properties:
        name:
          type: string
        set:
          type: string
        rarity:
          type: string
        tcg:
          type: number
        avg:
          type: number
        chg1d:
          type: number
        chg7d:
          type: number
        chg30d:
          type: number
        spark:
          type: array
          items:
            type: number
        imageUrl:
          type: string
          nullable: true
        imageUrlSmall:
          type: string
          nullable: true
        cardImageId:
          type: string
          nullable: true
    CharacterIndexItem:
      type: object
      required:
        - slug
        - name
        - subtitle
        - faction
        - tier
        - indexValue
        - cardCount
        - chg7d
        - chg30d
        - up
        - topCards
      properties:
        slug:
          type: string
        name:
          type: string
        subtitle:
          type: string
          nullable: true
        faction:
          type: string
          nullable: true
        tier:
          type: integer
        indexValue:
          type: number
        cardCount:
          type: integer
        chg7d:
          type: number
        chg30d:
          type: number
        up:
          type: boolean
        topCards:
          type: array
          items:
            $ref: "#/components/schemas/CharacterTopCard"
    RarityTopCard:
      type: object
      required:
        - name
        - set
        - rarity
        - tcg
        - avg
        - chg1d
        - chg7d
        - chg30d
        - spark
        - cardImageId
        - imageSmall
      properties:
        name:
          type: string
        set:
          type: string
        rarity:
          type: string
        tcg:
          type: number
        avg:
          type: number
        chg1d:
          type: number
        chg7d:
          type: number
        chg30d:
          type: number
        spark:
          type: array
          items:
            type: number
        cardImageId:
          type: string
        imageSmall:
          type: string
          nullable: true
    RarityIndexItem:
      type: object
      required:
        - slug
        - name
        - code
        - subtitle
        - color
        - colorD
        - colorBd
        - indexValue
        - cardCount
        - avgCardPrice
        - chg7d
        - chg30d
        - up
        - topCards
      properties:
        slug:
          type: string
        name:
          type: string
        code:
          type: string
        subtitle:
          type: string
        color:
          type: string
        colorD:
          type: string
        colorBd:
          type: string
        indexValue:
          type: number
        cardCount:
          type: integer
        avgCardPrice:
          type: number
        chg7d:
          type: number
        chg30d:
          type: number
        up:
          type: boolean
        topCards:
          type: array
          items:
            $ref: "#/components/schemas/RarityTopCard"
    SetTopCard:
      type: object
      required:
        - id
        - img
        - e
        - n
        - rb
        - rl
        - tcg
        - avg
        - d1
        - d7
        - d30
        - sp
      properties:
        id:
          type: string
          format: uuid
        img:
          type: string
          nullable: true
        e:
          type: string
        n:
          type: string
        rb:
          type: string
        rl:
          type: string
        tcg:
          type: number
        avg:
          type: number
        d1:
          type: number
        d7:
          type: number
        d30:
          type: number
        sp:
          type: array
          items:
            type: number
    SetPerformance:
      type: object
      required:
        - h1
        - h24
        - d7
        - m1
        - y1
        - max
      properties:
        h1:
          type: string
        h24:
          type: string
        d7:
          type: string
        m1:
          type: string
        y1:
          type: string
        max:
          type: string
    SetIndexItem:
      type: object
      required:
        - slug
        - code
        - displayCode
        - name
        - year
        - color
        - colorD
        - colorBd
        - price
        - chg7d
        - chg1d
        - chg30d
        - chgMax
        - cards
        - cardsTotal
        - volume
        - ath
        - atl
        - up
        - spark
        - perf
        - perfUp
        - topCards
      properties:
        slug:
          type: string
        code:
          type: string
        displayCode:
          type: string
        name:
          type: string
        year:
          type: integer
        color:
          type: string
        colorD:
          type: string
        colorBd:
          type: string
        price:
          type: number
        chg7d:
          type: number
        chg1d:
          type: number
        chg30d:
          type: number
        chgMax:
          type: number
        cards:
          type: integer
        cardsTotal:
          type: integer
        volume:
          type: string
        ath:
          type: string
        atl:
          type: string
        up:
          type: boolean
        spark:
          type: array
          items:
            type: number
        perf:
          $ref: "#/components/schemas/SetPerformance"
        perfUp:
          type: array
          items:
            type: boolean
        topCards:
          type: array
          items:
            $ref: "#/components/schemas/SetTopCard"
    ExtraSetIndexItem:
      type: object
      required:
        - slug
        - code
        - displayCode
        - name
        - year
        - color
        - price
        - chg7d
        - up
      properties:
        slug:
          type: string
        code:
          type: string
        displayCode:
          type: string
        name:
          type: string
        year:
          type: integer
        color:
          type: string
        price:
          type: number
        chg7d:
          type: number
        up:
          type: boolean
    SetIndexResponse:
      type: object
      required:
        - sets
        - extraSets
      properties:
        sets:
          type: array
          items:
            $ref: "#/components/schemas/SetIndexItem"
        extraSets:
          type: array
          items:
            $ref: "#/components/schemas/ExtraSetIndexItem"
    SetDetailResponse:
      type: object
      required:
        - set
        - cards
      properties:
        set:
          $ref: "#/components/schemas/SetInfo"
        cards:
          type: array
          items:
            $ref: "#/components/schemas/CardWithPriceStats"
    CardDetailPriceStats:
      allOf:
        - $ref: "#/components/schemas/PriceStats"
        - type: object
          required:
            - tcg_low
            - tcg_mid
            - tcg_high
            - ath
            - ath_date
            - atl
            - atl_date
            - updated_at
          properties:
            tcg_low:
              type: number
              nullable: true
            tcg_mid:
              type: number
              nullable: true
            tcg_high:
              type: number
              nullable: true
            ath:
              type: number
              nullable: true
            ath_date:
              type: string
              nullable: true
            atl:
              type: number
              nullable: true
            atl_date:
              type: string
              nullable: true
            updated_at:
              type: string
              nullable: true
    PriceHistoryPoint:
      type: object
      required:
        - tcg_market
        - market_avg
        - recorded_at
      properties:
        tcg_market:
          type: number
        market_avg:
          type: number
        recorded_at:
          type: string
          format: date-time
    CardDetailResponse:
      type: object
      required:
        - card
        - set
        - priceStats
        - priceHistory
        - priceHistorySynthetic
      properties:
        card:
          $ref: "#/components/schemas/CardBase"
        set:
          allOf:
            - $ref: "#/components/schemas/SetInfo"
          nullable: true
        priceStats:
          allOf:
            - $ref: "#/components/schemas/CardDetailPriceStats"
          nullable: true
        priceHistory:
          type: array
          items:
            $ref: "#/components/schemas/PriceHistoryPoint"
        priceHistorySynthetic:
          type: boolean
    CardSearchResult:
      type: object
      required:
        - id
        - name
        - card_number
        - rarity
        - image_url
        - image_url_small
        - set_id
        - sets
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
        card_number:
          type: string
          nullable: true
        rarity:
          type: string
          nullable: true
        image_url:
          type: string
          nullable: true
        image_url_small:
          type: string
          nullable: true
        set_id:
          type: string
          format: uuid
          nullable: true
        sets:
          oneOf:
            - $ref: "#/components/schemas/CardSearchSet"
            - type: array
              items:
                $ref: "#/components/schemas/CardSearchSet"
          nullable: true
    CardSearchSet:
      type: object
      required:
        - code
        - name
      properties:
        code:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
    InventoryCreateRequest:
      type: object
      required:
        - card_id
        - inventory_type
        - status
      properties:
        card_id:
          type: string
          description: Catalog card UUID, or an empty string for manual items.
        manual_card_name:
          type: string
        manual_card_number:
          type: string
        manual_set_code:
          type: string
        catalog_match_status:
          $ref: "#/components/schemas/CatalogMatchStatus"
        item_nickname:
          type: string
        inventory_type:
          $ref: "#/components/schemas/InventoryType"
        status:
          $ref: "#/components/schemas/InventoryStatus"
        quantity:
          oneOf:
            - type: string
            - type: integer
          default: 1
        graded_rating:
          oneOf:
            - $ref: "#/components/schemas/GradedRating"
            - type: string
              enum:
                - ""
        certification_number:
          type: string
        acquired_at:
          type: string
          format: date
        cost_basis:
          oneOf:
            - type: string
            - type: number
        purchased_from:
          oneOf:
            - $ref: "#/components/schemas/PurchasedFrom"
            - type: string
              enum:
                - ""
        notes:
          type: string
    InventoryCreateMultipartRequest:
      allOf:
        - $ref: "#/components/schemas/InventoryCreateRequest"
        - type: object
          properties:
            custom_image_front:
              type: string
              format: binary
            custom_image_back:
              type: string
              format: binary
    InventoryCloneRequest:
      type: object
      required:
        - source_id
      properties:
